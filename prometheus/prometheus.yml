global:
    scrape_interval: 15s

scrape_configs:
    -   job_name: 'prometheus'
        static_configs:
            -   targets: [ 'localhost:9090' ]

    -   job_name: 'users-api'
        scrape_interval: 5s
        static_configs:
            -   targets: [ 'users-api:5000' ]
    -   job_name: 'orders-api'
        scrape_interval: 5s
        static_configs:
            -   targets: [ 'orders-api:5000' ]